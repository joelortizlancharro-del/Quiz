<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizGame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
</head>
<body class="bg-gray-900 flex flex-col min-h-screen">

    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-screen-xl flex items-center justify-center mx-auto p-4">
            <div class="flex flex-col items-center">
                <span class="text-purple-600 font-semibold text-lg">QUIZGAME</span>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center px-3 py-6 sm:px-4 sm:py-10">
        <div class="w-full max-w-xl bg-gray-800 rounded-2xl border border-gray-700 p-4 sm:p-6">

            <div class="flex justify-between items-center mb-2">
                <span class="text-gray-400 text-xs sm:text-sm" id="categoria">Categoria</span>
                <span class="text-gray-400 text-xs sm:text-sm" id="comptador">Pregunta x / 30</span>
            </div>

            <div class="w-full bg-gray-700 rounded-full h-2 mb-1">
                <div class="bg-purple-500 h-2 rounded-full" id="progressBar" style="width: 65%"></div>
            </div>
            <p class="text-gray-400 text-xs text-right mb-3" id="timer">segons restants</p>

            <div class="bg-gray-700 rounded-xl p-3 sm:p-4 mb-4" id="tarjeta">
                <span class="bg-purple-600 text-white text-xs px-3 py-1 rounded-full mb-3 inline-block" id="numPregunta">Pregunta x</span>
                <p class="text-white font-semibold text-sm sm:text-base" id="textPregunta"></p>
            </div>

            <ul class="space-y-2 sm:space-y-3 mb-4 sm:mb-6">
                <li>
                    <button class="w-full flex items-center gap-3 bg-gray-700 hover:bg-gray-600 border border-gray-600 rounded-lg px-3 sm:px-4 py-3 text-left transition-colors text-sm" id="opcioA"></button>
                </li>
                <li>
                    <button class="w-full flex items-center gap-3 bg-gray-700 hover:bg-gray-600 border border-gray-600 rounded-lg px-3 sm:px-4 py-3 text-left transition-colors text-sm" id="opcioB"></button>
                </li>
                <li>
                    <button class="w-full flex items-center gap-3 bg-gray-700 hover:bg-gray-600 border border-gray-600 rounded-lg px-3 sm:px-4 py-3 text-left transition-colors text-sm" id="opcioC"></button>
                </li>
                <li>
                    <button class="w-full flex items-center gap-3 bg-gray-700 hover:bg-gray-600 border border-gray-600 rounded-lg px-3 sm:px-4 py-3 text-left transition-colors text-sm" id="opcioD"></button>
                </li>
            </ul>

            <div class="flex justify-between items-center">
                <button class="px-3 sm:px-4 py-2 rounded-lg border border-purple-500 text-purple-400 text-xs sm:text-sm hover:bg-gray-700 transition-colors">
                    ← Tornar
                </button>
                <span class="text-gray-400 text-xs sm:text-sm" id="timerFooter">Temps restant: x</span>
            </div>

        </div>
    </main>

    <footer class="bg-gray-800 border-t border-gray-700">
        <div class="w-full max-w-screen-xl mx-auto p-4">
            <hr class="my-4 border-gray-700 sm:mx-auto" />
            <span class="block text-sm text-gray-400 text-center">Joel Ortiz, Albert Castellon, Eric Fradera, Pol Hernaez</span>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
</body>
</html>
