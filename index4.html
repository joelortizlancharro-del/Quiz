<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizGame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
</head>
<body id="pagina4" class="bg-gray-900 flex flex-col min-h-screen">

    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-screen-xl flex items-center justify-center mx-auto p-4">
            <div class="flex flex-col items-center">
                <span class="text-purple-600 font-semibold text-lg">QUIZGAME</span>
            </div>
        </div>
    </nav>

    <main class="flex-1 flex items-center justify-center px-4 py-8">
        <div class="w-full max-w-sm bg-gray-800 rounded-2xl border border-gray-700 p-6 sm:p-8">

            <div class="flex flex-col items-center mb-6">
                <div class="w-20 h-20 sm:w-24 sm:h-24 rounded-full border-4 border-purple-500 flex flex-col items-center justify-center mb-4">
                    <span class="text-purple-400 text-3xl sm:text-4xl font-bold" id="puntuacio">x</span>
                    <span class="text-gray-400 text-xs sm:text-sm" id="total">pts. de x</span>
                </div>
                <h2 class="text-white font-bold text-base sm:text-lg" id="missatge">Molt bé, <span id="nomUsuari"></span>!</h2>
                <p class="text-gray-400 text-xs sm:text-sm text-center" id="submissatge">Has encertat x de 30 preguntes</p>
            </div>

            <div class="space-y-2 mb-6">
                <div class="flex justify-between items-center bg-gray-700 rounded-lg px-4 py-3">
                    <span class="text-gray-300 text-sm">Correctes</span>
                    <span class="text-purple-400 font-semibold" id="correctes">0</span>
                </div>
                <div class="flex justify-between items-center bg-gray-700 rounded-lg px-4 py-3">
                    <span class="text-gray-300 text-sm">Incorrectes</span>
                    <span class="text-purple-400 font-semibold" id="incorrectes">0</span>
                </div>
                <div class="flex justify-between items-center bg-gray-700 rounded-lg px-4 py-3">
                    <span class="text-gray-300 text-sm">Millor puntuació</span>
                    <span class="text-purple-400 font-semibold" id="millorPuntuacio">0</span>
                </div>
            </div>

            <div class="flex flex-col sm:grid sm:grid-cols-2 gap-3">
                <button class="py-3 rounded-lg bg-purple-600 hover:bg-purple-700 text-white font-semibold transition-colors text-sm" id="btnTornar">
                    Tornar a jugar
                </button>
                <button class="py-3 rounded-lg border border-purple-500 text-purple-400 hover:bg-gray-700 font-semibold transition-colors text-sm" id="btnCategoria">
                    Canviar categoria
                </button>
            </div>

        </div>
    </main>

    <footer class="bg-gray-800 border-t border-gray-700">
        <div class="w-full max-w-screen-xl mx-auto p-4">
            <hr class="my-4 border-gray-700 sm:mx-auto" />
            <span class="block text-sm text-gray-400 text-center">Joel Ortiz, Albert Castellon, Eric Fradera, Pol Hernaez</span>
        </div>
    </footer>
    <script src="script.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
</body>
</html>
