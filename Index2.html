<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuizGame</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.css" rel="stylesheet" />
</head>
<body class="bg-gray-900 flex flex-col min-h-screen">

    <nav class="bg-gray-800 border-b border-gray-700">
        <div class="max-w-screen-xl flex items-center justify-center mx-auto p-4">
            <a class="flex items-center gap-2">
                <div class="flex flex-col items-center">
                    <span class="text-purple-600 font-semibold text-lg">QUIZGAME</span>
                </div>
            </a>
        </div>
    </nav>

    <main class="flex-1 flex flex-col items-center justify-center px-4 py-10">
<h3 class="mb-1 text-xl font-semibold text-white">Hola, <span id="nomUsuari">x</span>!</h3><p class="mb-8 text-gray-400 text-sm">Quina categoria vols jugar?</p>

        <ul class="grid w-full max-w-3xl gap-4 md:grid-cols-3">

            <li>
                <input type="radio" id="classics-option" value="classics" name="categories" class="hidden peer">
                <label for="classics-option" class="inline-flex items-start w-full p-5 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:bg-gray-700 peer-checked:border-purple-500 peer-checked:bg-gray-700 transition-colors">
                    <div class="block">
<img src="media/classics_ic.png" class="mb-2 w-10 h-10" alt="Clàssics" />

                        <div class="w-full font-semibold text-white mb-1" id="classics">Clàssics</div>
                        <div class="w-full text-sm text-gray-400">Preguntes sobre jocs clàssics i antics.</div>
                    </div>
                </label>
            </li>

            <li>
                <input type="radio" id="pokemon-option" value="pokemon" name="categories" class="hidden peer">
                <label for="pokemon-option" class="inline-flex items-start w-full p-5 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:bg-gray-700 peer-checked:border-purple-500 peer-checked:bg-gray-700 transition-colors">
                    <div class="block">
                        <img src="media/pokemon_ic.png" class="mb-2 w-10 h-10" alt="Pokémon" />
                        <div class="w-full font-semibold text-white mb-1" id="pokemon">Pokémon</div>
                        <div class="w-full text-sm text-gray-400">Preguntes sobre el univers de Pokémon.</div>
                    </div>
                </label>
            </li>

            <li>
                <input type="radio" id="shooters-option" value="shooters" name="categories" class="hidden peer">
                <label for="shooters-option" class="inline-flex items-start w-full p-5 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:bg-gray-700 peer-checked:border-purple-500 peer-checked:bg-gray-700 transition-colors">
                    <div class="block">
                       <img src="media/shooter_ic.png" class="mb-2 w-10 h-10" alt="Shooters" />

                        <div class="w-full font-semibold text-white mb-1" id="shooters">Shooters</div>
                        <div class="w-full text-sm text-gray-400">Preguntes sobre jocs de tir.</div>
                    </div>
                </label>
            </li>

            <li>
                <input type="radio" id="cultura-option" value="cultura" name="categories" class="hidden peer">
                <label for="cultura-option" class="inline-flex items-start w-full p-5 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:bg-gray-700 peer-checked:border-purple-500 peer-checked:bg-gray-700 transition-colors">
                    <div class="block">
                        <img src="media/cultura_ic.png" class="mb-2 w-10 h-10" alt="Cultura General" />
                        <div class="w-full font-semibold text-white mb-1" id="cultura">Cultura General</div>
                        <div class="w-full text-sm text-gray-400">Preguntes sobre cultura general de videojocs.</div>
                    </div>
                </label>
            </li>

            <li>
                <input type="radio" id="caos-option" value="caos" name="categories" class="hidden peer">
                <label for="caos-option" class="inline-flex items-start w-full p-5 bg-gray-800 border border-gray-700 rounded-xl cursor-pointer hover:bg-gray-700 peer-checked:border-purple-500 peer-checked:bg-gray-700 transition-colors">
                    <div class="block">
                        <img src="media/caos_ic.png" class="mb-2 w-10 h-10" alt="CAOS" />
                        <div class="w-full font-semibold text-white mb-1" id="caos">CAOS</div>
                        <div class="w-full text-sm text-gray-400">Totes les categories combinades en un sol Quiz.</div>
                    </div>
                </label>
            </li>

        </ul>

       
    </main>

    <footer class="bg-gray-800 border-t border-gray-700">
        <div class="w-full max-w-screen-xl mx-auto p-4 md:py-6">
            <hr class="my-4 border-gray-700 sm:mx-auto" />
            <span class="block text-sm text-gray-400 sm:text-center">Joel Ortiz, Albert Castellon, Eric Fradera, Pol Hernaez</span>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.3.0/flowbite.min.js"></script>
</body>
</html>
